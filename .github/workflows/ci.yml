name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate
        env:
          # A syntactically valid placeholder is enough for `prisma generate`,
          # which only needs to read the schema, not connect to a database.
          DATABASE_URL: "postgresql://user:password@localhost:5432/placeholder"

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint
